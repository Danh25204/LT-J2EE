<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Danh mục loại đồ cổ')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">Danh mục loại đồ cổ</h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item active">Danh mục</li>
                    </ol>

                    <!-- Thông báo -->
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="fas fa-check-circle me-1"></i>
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-1"></i>
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Card bảng danh mục -->
                    <div class="card mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <div>
                                <i class="fas fa-tags me-1"></i>
                                Danh sách danh mục
                                <span class="badge bg-secondary ms-1" th:text="${categories.size()}">0</span>
                            </div>
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/categories/create}"
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-plus me-1"></i> Thêm danh mục
                            </a>
                        </div>
                        <div class="card-body">
                            <div th:if="${categories.empty}" class="text-center text-muted py-4">
                                <i class="fas fa-inbox fa-3x mb-3 d-block"></i>
                                Chưa có danh mục nào. Hãy thêm danh mục đầu tiên!
                            </div>

                            <div th:unless="${categories.empty}" class="table-responsive">
                                <table class="table table-bordered table-hover align-middle datatable">
                                    <thead class="table-dark">
                                        <tr>
                                            <th style="width:60px">#</th>
                                            <th style="width:150px">Mã loại</th>
                                            <th>Tên loại</th>
                                            <th>Mô tả</th>
                                            <th style="width:120px" class="text-center">Số đồ cổ</th>
                                            <th sec:authorize="hasRole('ADMIN')" style="width:140px" class="text-center">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="cat, iterStat : ${categories}">
                                            <td th:text="${iterStat.count}"></td>
                                            <td>
                                                <span class="badge bg-info text-dark fw-semibold"
                                                      th:text="${cat.maLoai}"></span>
                                            </td>
                                            <td class="fw-semibold" th:text="${cat.tenLoai}"></td>
                                            <td>
                                                <span th:if="${cat.moTa != null and !#strings.isEmpty(cat.moTa)}"
                                                      th:text="${cat.moTa}" 
                                                      class="text-muted small"
                                                      style="max-width:300px; display:inline-block;
                                                             white-space:nowrap; overflow:hidden;
                                                             text-overflow:ellipsis;"></span>
                                                <span th:if="${cat.moTa == null or #strings.isEmpty(cat.moTa)}"
                                                      class="text-muted fst-italic small">—</span>
                                            </td>
                                            <td class="text-center">
                                                <span class="badge"
                                                      th:classappend="${cat.soLuongDocCo > 0} ? 'bg-success' : 'bg-secondary'"
                                                      th:text="${cat.soLuongDocCo}">0</span>
                                            </td>
                                            <td sec:authorize="hasRole('ADMIN')" class="text-center">
                                                <a th:href="@{/categories/{id}/edit(id=${cat.id})}"
                                                   class="btn btn-warning btn-sm me-1"
                                                   title="Chỉnh sửa">
                                                    <i class="fas fa-edit"></i>
                                                </a>
                                                <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                                                      method="post" class="d-inline"
                                                      th:id="'delete-form-' + ${cat.id}">
                                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                                           th:value="${_csrf.token}"/>
                                                    <button type="button"
                                                            class="btn btn-danger btn-sm delete-btn"
                                                            th:data-id="${cat.id}"
                                                            th:data-name="${cat.tenLoai}"
                                                            title="Xóa">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <div th:replace="~{fragments/footer :: footer}"></div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: scripts}"></div>

    <script>
        // Xác nhận xóa danh mục
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const name = this.dataset.name;
                const id   = this.dataset.id;
                if (confirm(`Bạn có chắc muốn xóa danh mục "${name}" không?\nHành động này không thể hoàn tác!`)) {
                    document.getElementById('delete-form-' + id).submit();
                }
            });
        });
    </script>
</body>
</html>
