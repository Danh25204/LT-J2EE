<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Chi Tiết Phiếu Nhập')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">
                        <i class="bi bi-file-earmark-text me-2 text-success"></i>Chi Tiết Phiếu Nhập
                    </h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/import-receipts}">Nhập kho</a></li>
                        <li class="breadcrumb-item active" th:text="${receipt.maPhieuNhap}"></li>
                    </ol>

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Thông tin phiếu -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-info-circle"></i> Thông tin phiếu nhập</h5>
                            <div>
                                <span th:if="${receipt.trangThai.name() == 'NHAP_KHO'}" class="badge bg-success fs-6">
                                    <i class="bi bi-check-circle"></i> Đã nhập kho
                                </span>
                                <span th:if="${receipt.trangThai.name() == 'HUY'}" class="badge bg-secondary fs-6">
                                    <i class="bi bi-x-circle"></i> Đã hủy
                                </span>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-3">
                                    <p class="mb-1 text-muted">Mã phiếu</p>
                                    <p class="fw-bold text-success" th:text="${receipt.maPhieuNhap}"></p>
                                </div>
                                <div class="col-md-3">
                                    <p class="mb-1 text-muted">Ngày nhập</p>
                                    <p class="fw-bold" th:text="${#temporals.format(receipt.ngayNhap, 'dd/MM/yyyy')}"></p>
                                </div>
                                <div class="col-md-3">
                                    <p class="mb-1 text-muted">Nguồn gốc</p>
                                    <p class="fw-bold" th:text="${receipt.nguonGoc ?: '—'}"></p>
                                </div>
                                <div class="col-md-3">
                                    <p class="mb-1 text-muted">Người tạo</p>
                                    <p class="fw-bold" th:text="${receipt.userName}"></p>
                                </div>
                            </div>
                            <div class="row" th:if="${receipt.ghiChu != null and !receipt.ghiChu.isEmpty()}">
                                <div class="col-12">
                                    <p class="mb-1 text-muted">Ghi chú</p>
                                    <p th:text="${receipt.ghiChu}"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Chi tiết đồ cổ -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0"><i class="bi bi-list-ul"></i> Danh sách đồ cổ nhập</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Ảnh</th>
                                            <th>Tên đồ cổ</th>
                                            <th class="text-center">Số lượng</th>
                                            <th class="text-end">Đơn giá</th>
                                            <th class="text-end">Thành tiền</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="detail : ${receipt.details}">
                                            <td>
                                                <img th:if="${detail.antiqueImage != null and !detail.antiqueImage.isEmpty()}"
                                                     th:src="@{'/uploads/' + ${detail.antiqueImage}}"
                                                     alt="Ảnh đồ cổ"
                                                     class="img-thumbnail"
                                                     style="width:60px;height:60px;object-fit:cover;">
                                                <span th:unless="${detail.antiqueImage != null and !detail.antiqueImage.isEmpty()}"
                                                      class="text-muted">—</span>
                                            </td>
                                            <td>
                                                <strong th:text="${detail.antiqueName}"></strong>
                                            </td>
                                            <td class="text-center" th:text="${detail.soLuong}"></td>
                                            <td class="text-end"
                                                th:text="${#numbers.formatDecimal(detail.donGia, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                            <td class="text-end text-success fw-bold"
                                                th:text="${#numbers.formatDecimal(detail.thanhTien, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                        </tr>
                                    </tbody>
                                    <tfoot class="table-light">
                                        <tr>
                                            <td colspan="4" class="text-end fw-bold">Tổng giá trị:</td>
                                            <td class="text-end text-success fw-bold fs-5"
                                                th:text="${#numbers.formatDecimal(receipt.tongGiaTri, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="d-flex justify-content-between mb-5">
                        <a th:href="@{/import-receipts}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Quay lại danh sách
                        </a>
                        <form th:if="${receipt.trangThai.name() == 'NHAP_KHO'}"
                              th:action="@{/import-receipts/{id}/cancel(id=${receipt.id})}"
                              method="post"
                              onsubmit="return confirm('Bạn có chắc muốn hủy phiếu này? Thao tác này không thể hoàn tác!');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-x-circle"></i> Hủy phiếu
                            </button>
                        </form>
                    </div>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
