<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Phiếu Xuất Kho')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">
                        <i class="bi bi-box-arrow-up me-2 text-danger"></i>Phiếu Xuất Kho
                    </h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item active">Xuất kho</li>
                    </ol>

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted">Tổng: <strong th:text="${receipts.size()}">0</strong> phiếu</span>
                        <a th:href="@{/export-receipts/new}" class="btn btn-danger">
                            <i class="bi bi-plus-circle"></i> Tạo Phiếu Xuất Mới
                        </a>
                    </div>

                    <div class="card mb-4 shadow-sm">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-striped align-middle datatable">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Mã Phiếu</th>
                                            <th>Ngày Xuất</th>
                                            <th>Lý Do Xuất</th>
                                            <th>Người Nhận</th>
                                            <th>Tổng Giá Trị</th>
                                            <th>Người Tạo</th>
                                            <th>Trạng Thái</th>
                                            <th>Thao Tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="receipt : ${receipts}">
                                            <td>
                                                <strong class="text-danger" th:text="${receipt.maPhieuXuat}"></strong>
                                            </td>
                                            <td>
                                                <span th:text="${#temporals.format(receipt.ngayXuat, 'dd/MM/yyyy')}"></span>
                                            </td>
                                            <td>
                                                <span th:if="${receipt.lyDo != null}" th:text="${receipt.lyDo.label}"></span>
                                                <span th:unless="${receipt.lyDo != null}" class="text-muted">—</span>
                                            </td>
                                            <td th:text="${receipt.nguoiNhan ?: '—'}"></td>
                                            <td>
                                                <strong class="text-danger"
                                                        th:text="${#numbers.formatDecimal(receipt.tongGiaTri, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                                </strong>
                                            </td>
                                            <td th:text="${receipt.userName}"></td>
                                            <td>
                                                <span th:if="${receipt.trangThai.name() == 'XUAT_KHO'}" class="badge bg-danger">
                                                    <i class="bi bi-box-arrow-up"></i> Đã xuất kho
                                                </span>
                                                <span th:if="${receipt.trangThai.name() == 'HUY'}" class="badge bg-secondary">
                                                    <i class="bi bi-x-circle"></i> Đã hủy
                                                </span>
                                            </td>
                                            <td>
                                                <a th:href="@{/export-receipts/{id}(id=${receipt.id})}"
                                                   class="btn btn-sm btn-info" title="Xem chi tiết">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <form th:if="${receipt.trangThai.name() == 'XUAT_KHO'}"
                                                      th:action="@{/export-receipts/{id}/cancel(id=${receipt.id})}"
                                                      method="post" style="display:inline;"
                                                      onsubmit="return confirm('Hủy phiếu này sẽ hoàn lại tồn kho. Bạn có chắc?');">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                    <button type="submit" class="btn btn-sm btn-warning" title="Hủy phiếu">
                                                        <i class="bi bi-x-circle"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
