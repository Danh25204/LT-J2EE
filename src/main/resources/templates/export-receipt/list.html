<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Phiếu Xuất Kho')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">
                        <i class="bi bi-box-arrow-up me-2 text-danger"></i>Phiếu Xuất Kho
                    </h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item active">Xuất kho</li>
                    </ol>

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted">Tổng: <strong th:text="${totalElements}">0</strong> phiếu</span>
                        <a th:href="@{/export-receipts/new}" class="btn btn-danger">
                            <i class="bi bi-plus-circle"></i> Tạo Phiếu Xuất Mới
                        </a>
                    </div>

                    <!-- Bộ lọc theo ngày -->
                    <div class="card mb-3 shadow-sm">
                        <div class="card-body py-2">
                            <form method="get" th:action="@{/export-receipts}" class="row g-2 align-items-end">
                                <div class="col-md-3">
                                    <label class="form-label mb-1 small fw-semibold">Từ ngày</label>
                                    <input type="date" name="tuNgay" class="form-control form-control-sm"
                                           th:value="${tuNgay}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label mb-1 small fw-semibold">Đến ngày</label>
                                    <input type="date" name="denNgay" class="form-control form-control-sm"
                                           th:value="${denNgay}">
                                </div>
                                <input type="hidden" name="size" th:value="${pageSize}">
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-sm btn-primary w-100">
                                        <i class="bi bi-search"></i> Lọc
                                    </button>
                                </div>
                                <div class="col-md-2">
                                    <a th:href="@{/export-receipts}" class="btn btn-sm btn-outline-secondary w-100">
                                        <i class="bi bi-x-circle"></i> Xóa bộ lọc
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card mb-4 shadow-sm">
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-striped align-middle">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Mã Phiếu</th>
                                            <th>Ngày Xuất</th>
                                            <th>Lý Do Xuất</th>
                                            <th>Người Nhận</th>
                                            <th>Tổng Giá Trị</th>
                                            <th>Người Tạo</th>
                                            <th>Trạng Thái</th>
                                            <th>Thao Tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="receipt : ${receipts}">
                                            <td>
                                                <strong class="text-danger" th:text="${receipt.maPhieuXuat}"></strong>
                                            </td>
                                            <td>
                                                <span th:text="${#temporals.format(receipt.ngayXuat, 'dd/MM/yyyy')}"></span>
                                            </td>
                                            <td>
                                                <span th:if="${receipt.lyDo != null}" th:text="${receipt.lyDo.label}"></span>
                                                <span th:unless="${receipt.lyDo != null}" class="text-muted">—</span>
                                            </td>
                                            <td th:text="${receipt.nguoiNhan ?: '—'}"></td>
                                            <td>
                                                <strong class="text-danger"
                                                        th:text="${#numbers.formatDecimal(receipt.tongGiaTri, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                                                </strong>
                                            </td>
                                            <td th:text="${receipt.userName}"></td>
                                            <td>
                                                <span th:if="${receipt.trangThai.name() == 'XUAT_KHO'}" class="badge bg-danger">
                                                    <i class="bi bi-box-arrow-up"></i> Đã xuất kho
                                                </span>
                                                <!-- CHO_MUON + HUY = đã nhận lại -->
                                                <span th:if="${receipt.trangThai.name() == 'HUY' and receipt.lyDo != null and receipt.lyDo.name() == 'CHO_MUON'}" class="badge bg-success">
                                                    <i class="bi bi-arrow-return-left"></i> Đã nhận lại
                                                </span>
                                                <!-- HUY thường -->
                                                <span th:if="${receipt.trangThai.name() == 'HUY' and (receipt.lyDo == null or receipt.lyDo.name() != 'CHO_MUON')}" class="badge bg-secondary">
                                                    <i class="bi bi-x-circle"></i> Đã hủy
                                                </span>
                                            </td>
                                            <td>
                                                <a th:href="@{/export-receipts/{id}(id=${receipt.id})}"
                                                   class="btn btn-sm btn-info" title="Xem chi tiết">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <!-- Nút hủy chỉ cho XUAT_KHO -->
                                                <form th:if="${receipt.trangThai.name() == 'XUAT_KHO' and (receipt.lyDo == null or receipt.lyDo.name() != 'CHO_MUON')}"
                                                      th:action="@{/export-receipts/{id}/cancel(id=${receipt.id})}"
                                                      method="post" style="display:inline;"
                                                      onsubmit="return confirm('Hủy phiếu này sẽ hoàn lại tồn kho. Bạn có chắc?');">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                    <button type="submit" class="btn btn-sm btn-warning" title="Hủy phiếu">
                                                        <i class="bi bi-x-circle"></i>
                                                    </button>
                                                </form>
                                                <!-- Nút nhận lại cho CHO_MUON đang xuất kho -->
                                                <form th:if="${receipt.trangThai.name() == 'XUAT_KHO' and receipt.lyDo != null and receipt.lyDo.name() == 'CHO_MUON'}"
                                                      th:action="@{/export-receipts/{id}/cancel(id=${receipt.id})}"
                                                      method="post" style="display:inline;"
                                                      onsubmit="return confirm('Xác nhận đã nhận lại hàng cho mượn?');">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                    <button type="submit" class="btn btn-sm btn-success" title="Ghi nhận trả hàng">
                                                        <i class="bi bi-arrow-return-left"></i>
                                                    </button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(receipts)}">
                                            <td colspan="8" class="text-center text-muted py-4">
                                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                                Không có phiếu xuất nào phù hợp
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Phân trang -->
                    <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3">
                        <span class="text-muted small">
                            Trang <strong th:text="${currentPage + 1}"></strong> / <strong th:text="${totalPages}"></strong>
                        </span>
                        <nav>
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/export-receipts(page=${currentPage - 1}, size=${pageSize}, tuNgay=${tuNgay}, denNgay=${denNgay})}">
                                        &laquo;
                                    </a>
                                </li>
                                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    class="page-item" th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link"
                                       th:href="@{/export-receipts(page=${i}, size=${pageSize}, tuNgay=${tuNgay}, denNgay=${denNgay})}"
                                       th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/export-receipts(page=${currentPage + 1}, size=${pageSize}, tuNgay=${tuNgay}, denNgay=${denNgay})}">
                                        &raquo;
                                    </a>
                                </li>
                            </ul>
                        </nav>
                    </div>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
