<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Tạo Phiếu Xuất Kho')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">
                        <i class="bi bi-box-arrow-up me-2 text-danger"></i>Tạo Phiếu Xuất Kho
                    </h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/export-receipts}">Xuất kho</a></li>
                        <li class="breadcrumb-item active">Tạo mới</li>
                    </ol>

                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/export-receipts}" method="post" th:object="${exportReceiptDTO}"
                          onsubmit="return validateForm()">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-danger text-white">
                                <h5 class="mb-0"><i class="bi bi-info-circle"></i> Thông tin phiếu xuất</h5>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label">Ngày xuất <span class="text-danger">*</span></label>
                                            <input type="date" class="form-control" th:field="*{ngayXuat}" required>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label">Lý do xuất <span class="text-danger">*</span></label>
                                            <select class="form-select" th:field="*{lyDo}" required>
                                                <option value="">-- Chọn lý do --</option>
                                                <option th:each="ld : ${lyDoList}"
                                                        th:value="${ld.name()}"
                                                        th:text="${ld.label}">
                                                </option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="mb-3">
                                            <label class="form-label">Người nhận</label>
                                            <input type="text" class="form-control" th:field="*{nguoiNhan}"
                                                   placeholder="Tên người/đơn vị nhận hàng">
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Ghi chú</label>
                                    <textarea class="form-control" th:field="*{ghiChu}" rows="2"
                                              placeholder="Ghi chú thêm..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="bi bi-list-ul"></i> Chi tiết đồ cổ xuất</h5>
                                <button type="button" class="btn btn-sm btn-light" onclick="addDetailRow()">
                                    <i class="bi bi-plus-circle"></i> Thêm dòng
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="detailsContainer"></div>
                                <div class="text-end mt-3 border-top pt-3">
                                    <h4>Tổng giá trị: <span id="totalValue" class="text-danger fw-bold">0 ₫</span></h4>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-5">
                            <a th:href="@{/export-receipts}" class="btn btn-secondary btn-lg">
                                <i class="bi bi-x-circle"></i> Hủy
                            </a>
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-save"></i> Lưu Phiếu Xuất
                            </button>
                        </div>
                    </form>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>

    <template id="detailRowTemplate">
        <div class="detail-row border rounded p-3 mb-3" data-index="INDEX">
            <div class="row align-items-center">
                <div class="col-md-1 text-center">
                    <img class="rounded img-thumbnail" src="" alt="Preview" id="preview_INDEX"
                         style="width:60px;height:60px;object-fit:cover;display:none;">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Đồ cổ <span class="text-danger">*</span></label>
                    <select class="form-select" name="details[INDEX].antiqueId"
                            onchange="updateAntiqueInfo(INDEX)" required>
                        <option value="">-- Chọn đồ cổ --</option>
                        <option th:each="inv : ${inventories}"
                                th:value="${inv.antique.id}"
                                th:text="${inv.antique.tenDocCo + ' (tồn: ' + inv.soLuongTon + ')'}"
                                th:attr="data-image=${inv.antique.anhChinh},
                                         data-price=${inv.antique.giaBanDuKien},
                                         data-stock=${inv.soLuongTon}">
                        </option>
                    </select>
                    <small id="stock_label_INDEX" class="text-muted"></small>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Số lượng <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" name="details[INDEX].soLuong"
                           value="1" min="1" onchange="calculateRowTotal(INDEX)" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Đơn giá <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" name="details[INDEX].donGia"
                           min="0" step="1000" onchange="calculateRowTotal(INDEX)" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Thành tiền</label>
                    <input type="text" class="form-control bg-light" id="thanhTien_INDEX"
                           readonly value="0 ₫">
                </div>
                <div class="col-md-1 text-center">
                    <label class="form-label d-block">&nbsp;</label>
                    <button type="button" class="btn btn-sm btn-danger"
                            onclick="removeDetailRow(INDEX)" title="Xóa dòng">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script>
        let detailIndex = 0;

        function addDetailRow() {
            const container = document.getElementById('detailsContainer');
            const template = document.getElementById('detailRowTemplate').innerHTML;
            const newRow = template.replace(/INDEX/g, detailIndex);
            const div = document.createElement('div');
            div.innerHTML = newRow;
            container.appendChild(div.firstElementChild);
            detailIndex++;
        }

        function removeDetailRow(index) {
            const row = document.querySelector('.detail-row[data-index="' + index + '"]');
            if (row) {
                row.remove();
                calculateTotal();
            }
        }

        function updateAntiqueInfo(index) {
            const select = document.querySelector('select[name="details[' + index + '].antiqueId"]');
            const selectedOption = select.options[select.selectedIndex];

            // Preview ảnh
            const imageFile = selectedOption.getAttribute('data-image');
            const preview = document.getElementById('preview_' + index);
            if (imageFile && imageFile !== 'null' && imageFile !== '') {
                preview.src = '/uploads/' + imageFile;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }

            // Hiện tồn kho
            const stock = parseInt(selectedOption.getAttribute('data-stock')) || 0;
            const stockLabel = document.getElementById('stock_label_' + index);
            if (stockLabel && select.value) {
                stockLabel.textContent = 'Tồn kho hiện tại: ' + stock;
                stockLabel.className = 'small ' + (stock > 0 ? 'text-success' : 'text-danger');
                // Giới hạn số lượng nhập
                const soLuongInput = document.querySelector('input[name="details[' + index + '].soLuong"]');
                soLuongInput.max = stock;
                if (parseInt(soLuongInput.value) > stock) soLuongInput.value = stock;
            } else if (stockLabel) {
                stockLabel.textContent = '';
            }

            // Điền giá bán dự kiến
            const price = selectedOption.getAttribute('data-price');
            const priceInput = document.querySelector('input[name="details[' + index + '].donGia"]');
            if (price && price !== 'null' && price !== '') {
                priceInput.value = price;
            }

            calculateRowTotal(index);
        }

        function calculateRowTotal(index) {
            const soLuong = parseInt(document.querySelector('input[name="details[' + index + '].soLuong"]').value) || 0;
            const donGia = parseInt(document.querySelector('input[name="details[' + index + '].donGia"]').value) || 0;
            document.getElementById('thanhTien_' + index).value = (soLuong * donGia).toLocaleString('vi-VN') + ' ₫';
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.detail-row').forEach(function(row) {
                const idx = row.getAttribute('data-index');
                const soLuong = parseInt(document.querySelector('input[name="details[' + idx + '].soLuong"]').value) || 0;
                const donGia = parseInt(document.querySelector('input[name="details[' + idx + '].donGia"]').value) || 0;
                total += soLuong * donGia;
            });
            document.getElementById('totalValue').textContent = total.toLocaleString('vi-VN') + ' ₫';
        }

        function validateForm() {
            if (document.querySelectorAll('.detail-row').length === 0) {
                alert('Vui lòng thêm ít nhất 1 đồ cổ vào phiếu xuất!');
                return false;
            }
            let valid = true;
            document.querySelectorAll('.detail-row').forEach(function(row) {
                if (!valid) return;
                const idx = row.getAttribute('data-index');
                const select = document.querySelector('select[name="details[' + idx + '].antiqueId"]');
                if (!select.value) return;
                const maxStock = parseInt(select.options[select.selectedIndex].getAttribute('data-stock')) || 0;
                const soLuong = parseInt(document.querySelector('input[name="details[' + idx + '].soLuong"]').value) || 0;
                if (soLuong > maxStock) {
                    const name = select.options[select.selectedIndex].text;
                    alert('Số lượng xuất (' + soLuong + ') vượt quá tồn kho (' + maxStock + ') của: ' + name);
                    valid = false;
                }
            });
            return valid;
        }

        window.addEventListener('DOMContentLoaded', function() {
            addDetailRow();
        });
    </script>
</body>
</html>
