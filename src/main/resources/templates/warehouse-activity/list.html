<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Lịch Sử Hoạt Động Kho')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4">
                        <i class="bi bi-clock-history me-2 text-primary"></i>Lịch Sử Hoạt Động Kho
                    </h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item active">Lịch sử hoạt động</li>
                    </ol>

                    <!-- Thống kê nhanh -->
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body d-flex align-items-center gap-3">
                                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                                        <i class="bi bi-clock-history fs-4 text-success"></i>
                                    </div>
                                    <div>
                                        <div class="text-muted small">Tổng sự kiện</div>
                                        <div class="fw-bold fs-5" th:text="${totalElements}">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-xl-3">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-body d-flex align-items-center gap-3">
                                    <div class="rounded-circle bg-info bg-opacity-10 p-3">
                                        <i class="bi bi-funnel fs-4 text-info"></i>
                                    </div>
                                    <div>
                                        <div class="text-muted small">Đang hiển thị</div>
                                        <div class="fw-bold fs-5" th:text="${activities.size()}">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bộ lọc -->
                    <div class="card mb-3 shadow-sm">
                        <div class="card-header py-2">
                            <i class="bi bi-funnel me-1"></i> <strong>Bộ lọc</strong>
                        </div>
                        <div class="card-body py-3">
                            <form method="get" th:action="@{/warehouse-activities}" class="row g-2 align-items-end">
                                <div class="col-md-2">
                                    <label class="form-label mb-1 small fw-semibold">Loại hoạt động</label>
                                    <select name="loai" class="form-select form-select-sm">
                                        <option value="">-- Tất cả --</option>
                                        <option th:each="l : ${loaiList}"
                                                th:value="${l.name()}"
                                                th:text="${l.moTa}"
                                                th:selected="${loai != null and loai.name() == l.name()}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 small fw-semibold">Từ ngày</label>
                                    <input type="date" name="tuNgay" class="form-control form-control-sm"
                                           th:value="${tuNgay}">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 small fw-semibold">Đến ngày</label>
                                    <input type="date" name="denNgay" class="form-control form-control-sm"
                                           th:value="${denNgay}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label mb-1 small fw-semibold">Tìm kiếm</label>
                                    <input type="text" name="keyword" class="form-control form-control-sm"
                                           placeholder="Mô tả, mã phiếu..."
                                           th:value="${keyword}">
                                </div>
                                <div class="col-md-3 d-flex gap-2">
                                    <button type="submit" class="btn btn-primary btn-sm">
                                        <i class="bi bi-search"></i> Lọc
                                    </button>
                                    <a th:href="@{/warehouse-activities}" class="btn btn-outline-secondary btn-sm">
                                        <i class="bi bi-x-circle"></i> Xóa bộ lọc
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Bảng lịch sử -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 align-middle">
                                    <thead class="table-dark">
                                        <tr>
                                            <th style="width:160px">Thời gian</th>
                                            <th style="width:140px">Loại</th>
                                            <th>Mô tả hoạt động</th>
                                            <th style="width:130px">Mã phiếu</th>
                                            <th style="width:100px" class="text-center">Số lượng</th>
                                            <th style="width:130px" class="text-end">Giá trị</th>
                                            <th style="width:110px">Người thực hiện</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${activities.empty}">
                                            <td colspan="7" class="text-center text-muted py-5">
                                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                                Chưa có hoạt động nào được ghi lại
                                            </td>
                                        </tr>
                                        <tr th:each="act : ${activities}">
                                            <!-- Thời gian -->
                                            <td class="small text-muted">
                                                <div th:text="${#temporals.format(act.createdAt, 'dd/MM/yyyy')}"></div>
                                                <div class="text-secondary" th:text="${#temporals.format(act.createdAt, 'HH:mm:ss')}"></div>
                                            </td>

                                            <!-- Loại badge -->
                                            <td>
                                                <span th:class="'badge bg-' + ${act.badgeColor}">
                                                    <i th:class="'bi ' + ${act.icon} + ' me-1'"></i>
                                                    <span th:text="${act.loaiMoTa}"></span>
                                                </span>
                                            </td>

                                            <!-- Mô tả -->
                                            <td class="small" th:text="${act.moTa}"></td>

                                            <!-- Mã phiếu link -->
                                            <td class="small">
                                                <a th:if="${act.importReceiptId != null}"
                                                   th:href="@{/import-receipts/{id}(id=${act.importReceiptId})}"
                                                   class="text-decoration-none fw-semibold text-success"
                                                   th:text="${act.thamChieu}"></a>
                                                <a th:if="${act.exportReceiptId != null}"
                                                   th:href="@{/export-receipts/{id}(id=${act.exportReceiptId})}"
                                                   class="text-decoration-none fw-semibold text-danger"
                                                   th:text="${act.thamChieu}"></a>
                                                <span th:if="${act.importReceiptId == null and act.exportReceiptId == null}"
                                                      th:text="${act.thamChieu}" class="text-muted"></span>
                                            </td>

                                            <!-- Số lượng thay đổi -->
                                            <td class="text-center fw-semibold">
                                                <span th:if="${act.soLuongThayDoi != null and act.soLuongThayDoi > 0}"
                                                      class="text-success"
                                                      th:text="'+' + ${act.soLuongThayDoi}"></span>
                                                <span th:if="${act.soLuongThayDoi != null and act.soLuongThayDoi < 0}"
                                                      class="text-danger"
                                                      th:text="${act.soLuongThayDoi}"></span>
                                                <span th:if="${act.soLuongThayDoi == null}" class="text-muted">—</span>
                                            </td>

                                            <!-- Giá trị -->
                                            <td class="text-end small">
                                                <span th:if="${act.giaTri != null}"
                                                      th:text="${#numbers.formatDecimal(act.giaTri, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                                                <span th:if="${act.giaTri == null}" class="text-muted">—</span>
                                            </td>

                                            <!-- Người thực hiện -->
                                            <td class="small">
                                                <i class="bi bi-person me-1 text-muted"></i>
                                                <span th:text="${act.userName != null ? act.userName : 'Hệ thống'}"></span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Phân trang -->
                    <nav th:if="${totalPages > 1}" aria-label="Phân trang lịch sử">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/warehouse-activities(page=${currentPage - 1}, size=${pageSize},
                                       loai=${loai}, tuNgay=${tuNgay}, denNgay=${denNgay}, keyword=${keyword})}">
                                    &laquo;
                                </a>
                            </li>
                            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                class="page-item"
                                th:classappend="${i == currentPage} ? 'active'">
                                <a class="page-link"
                                   th:href="@{/warehouse-activities(page=${i}, size=${pageSize},
                                       loai=${loai}, tuNgay=${tuNgay}, denNgay=${denNgay}, keyword=${keyword})}"
                                   th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/warehouse-activities(page=${currentPage + 1}, size=${pageSize},
                                       loai=${loai}, tuNgay=${tuNgay}, denNgay=${denNgay}, keyword=${keyword})}">
                                    &raquo;
                                </a>
                            </li>
                        </ul>
                        <p class="text-center text-muted small">
                            Trang <strong th:text="${currentPage + 1}"></strong> /
                            <strong th:text="${totalPages}"></strong>
                            &nbsp;·&nbsp; Tổng <strong th:text="${totalElements}"></strong> sự kiện
                        </p>
                    </nav>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
