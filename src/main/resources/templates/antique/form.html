<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${isEdit} ? 'Sửa đồ cổ' : 'Thêm đồ cổ mới')}"></head>
<body class="sb-nav-fixed">

    <div th:replace="~{fragments/header :: topnav}"></div>

    <div id="layoutSidenav">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4" th:text="${isEdit} ? 'Sửa đồ cổ' : 'Thêm đồ cổ mới'"></h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/antiques}">Đồ cổ</a></li>
                        <li class="breadcrumb-item active" th:text="${isEdit} ? 'Chỉnh sửa' : 'Thêm mới'"></li>
                    </ol>

                    <div class="row justify-content-center">
                        <div class="col-lg-10">
                            <div class="card mb-4">
                                <div class="card-header bg-primary text-white">
                                    <i class="fas fa-edit me-1"></i>
                                    <span th:text="${isEdit} ? 'Chỉnh sửa đồ cổ' : 'Thêm đồ cổ mới'"></span>
                                </div>
                                <div class="card-body">

                                    <!-- Form: KHÔNG dùng multipart encoding -->
                                    <form id="antiqueForm"
                                          th:action="${isEdit}
                                                     ? @{/antiques/{id}/edit(id=${antiqueDTO.id})}
                                                     : @{/antiques/create}"
                                          th:object="${antiqueDTO}"
                                          method="post"
                                          novalidate>

                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        
                                        <!-- Hidden field để lưu filename sau khi upload AJAX -->
                                        <input type="hidden" id="anhChinhFilename" th:field="*{anhChinhFilename}"/>

                                        <!-- Hiển thị mã đồ cổ khi edit -->
                                        <div th:if="${isEdit}" class="mb-3">
                                            <label class="form-label fw-semibold">Mã đồ cổ</label>
                                            <input type="text" th:value="${antiqueDTO.maDocCo}"
                                                   class="form-control-plaintext fw-bold text-primary"
                                                   readonly>
                                        </div>

                                        <div class="row">
                                            <!-- Cột trái -->
                                            <div class="col-md-6">

                                                <!-- Tên đồ cổ -->
                                                <div class="mb-3">
                                                    <label for="tenDocCo" class="form-label fw-semibold">
                                                        Tên đồ cổ <span class="text-danger">*</span>
                                                    </label>
                                                    <input type="text" id="tenDocCo"
                                                           th:field="*{tenDocCo}"
                                                           th:classappend="${#fields.hasErrors('tenDocCo')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: Bình hoa men rạn Chu Đậu">
                                                    <div th:if="${#fields.hasErrors('tenDocCo')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{tenDocCo}"></div>
                                                </div>

                                                <!-- Danh mục -->
                                                <div class="mb-3">
                                                    <label for="categoryId" class="form-label fw-semibold">
                                                        Danh mục <span class="text-danger">*</span>
                                                    </label>
                                                    <select id="categoryId"
                                                            th:field="*{categoryId}"
                                                            th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid'"
                                                            class="form-select">
                                                        <option value="">-- Chọn danh mục --</option>
                                                        <option th:each="cat : ${categories}"
                                                                th:value="${cat.id}"
                                                                th:text="${cat.tenLoai}"></option>
                                                    </select>
                                                    <div th:if="${#fields.hasErrors('categoryId')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{categoryId}"></div>
                                                </div>

                                                <!-- Năm sản xuất -->
                                                <div class="mb-3">
                                                    <label for="namSanXuat" class="form-label fw-semibold">
                                                        Năm sản xuất
                                                    </label>
                                                    <input type="number" id="namSanXuat"
                                                           th:field="*{namSanXuat}"
                                                           th:classappend="${#fields.hasErrors('namSanXuat')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: 1840"
                                                           min="1" max="9999">
                                                    <div class="form-text">Để trống nếu không rõ năm</div>
                                                    <div th:if="${#fields.hasErrors('namSanXuat')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{namSanXuat}"></div>
                                                </div>

                                                <!-- Triều đại -->
                                                <div class="mb-3">
                                                    <label for="trieuDai" class="form-label fw-semibold">
                                                        Triều đại / Thời kỳ
                                                    </label>
                                                    <input type="text" id="trieuDai"
                                                           th:field="*{trieuDai}"
                                                           th:classappend="${#fields.hasErrors('trieuDai')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: Nhà Nguyễn, Thế kỷ XVIII">
                                                    <div th:if="${#fields.hasErrors('trieuDai')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{trieuDai}"></div>
                                                </div>

                                                <!-- Xuất xứ -->
                                                <div class="mb-3">
                                                    <label for="xuatXu" class="form-label fw-semibold">
                                                        Xuất xứ
                                                    </label>
                                                    <input type="text" id="xuatXu"
                                                           th:field="*{xuatXu}"
                                                           th:classappend="${#fields.hasErrors('xuatXu')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: Huế, Việt Nam">
                                                    <div th:if="${#fields.hasErrors('xuatXu')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{xuatXu}"></div>
                                                </div>

                                                <!-- Chất liệu -->
                                                <div class="mb-3">
                                                    <label for="chatLieu" class="form-label fw-semibold">
                                                        Chất liệu
                                                    </label>
                                                    <input type="text" id="chatLieu"
                                                           th:field="*{chatLieu}"
                                                           th:classappend="${#fields.hasErrors('chatLieu')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: Gốm men ngọc, Gỗ trắc">
                                                    <div th:if="${#fields.hasErrors('chatLieu')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{chatLieu}"></div>
                                                </div>

                                                <!-- Kích thước -->
                                                <div class="mb-3">
                                                    <label for="kichThuoc" class="form-label fw-semibold">
                                                        Kích thước
                                                    </label>
                                                    <input type="text" id="kichThuoc"
                                                           th:field="*{kichThuoc}"
                                                           th:classappend="${#fields.hasErrors('kichThuoc')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: Cao 25cm, Đường kính 15cm">
                                                    <div th:if="${#fields.hasErrors('kichThuoc')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{kichThuoc}"></div>
                                                </div>

                                            </div>

                                            <!-- Cột phải -->
                                            <div class="col-md-6">

                                                <!-- Tình trạng -->
                                                <div class="mb-3">
                                                    <label for="tinhTrang" class="form-label fw-semibold">
                                                        Tình trạng <span class="text-danger">*</span>
                                                    </label>
                                                    <select id="tinhTrang"
                                                            th:field="*{tinhTrang}"
                                                            th:classappend="${#fields.hasErrors('tinhTrang')} ? ' is-invalid'"
                                                            class="form-select">
                                                        <option th:each="tt : ${tinhTrangValues}"
                                                                th:value="${tt}"
                                                                th:text="${tt}"></option>
                                                    </select>
                                                    <div th:if="${#fields.hasErrors('tinhTrang')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{tinhTrang}"></div>
                                                </div>

                                                <!-- Số lượng mặc định -->
                                                <div class="mb-3">
                                                    <label for="soLuongMacDinh" class="form-label fw-semibold">
                                                        Số lượng mặc định
                                                    </label>
                                                    <input type="number" id="soLuongMacDinh"
                                                           th:field="*{soLuongMacDinh}"
                                                           th:classappend="${#fields.hasErrors('soLuongMacDinh')} ? ' is-invalid'"
                                                           class="form-control"
                                                           min="1" max="1000">
                                                    <div class="form-text">Đồ cổ thường là độc bản (= 1)</div>
                                                    <div th:if="${#fields.hasErrors('soLuongMacDinh')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{soLuongMacDinh}"></div>
                                                </div>

                                                <!-- Giá nhập -->
                                                <div class="mb-3">
                                                    <label for="giaNhap" class="form-label fw-semibold">
                                                        Giá nhập (VNĐ)
                                                    </label>
                                                    <input type="number" id="giaNhap"
                                                           th:field="*{giaNhap}"
                                                           th:classappend="${#fields.hasErrors('giaNhap')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: 50000000"
                                                           step="1000">
                                                    <div th:if="${#fields.hasErrors('giaNhap')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{giaNhap}"></div>
                                                </div>

                                                <!-- Giá bán dự kiến -->
                                                <div class="mb-3">
                                                    <label for="giaBanDuKien" class="form-label fw-semibold">
                                                        Giá bán dự kiến (VNĐ)
                                                    </label>
                                                    <input type="number" id="giaBanDuKien"
                                                           th:field="*{giaBanDuKien}"
                                                           th:classappend="${#fields.hasErrors('giaBanDuKien')} ? ' is-invalid'"
                                                           class="form-control"
                                                           placeholder="VD: 80000000"
                                                           step="1000">
                                                    <div th:if="${#fields.hasErrors('giaBanDuKien')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{giaBanDuKien}"></div>
                                                </div>

                                                <!-- Upload ảnh qua AJAX (cho cả CREATE và EDIT) -->
                                                <div class="mb-3">
                                                    <label for="imageFileInput" class="form-label fw-semibold">
                                                        Ảnh hiện vật
                                                    </label>
                                                    <input type="file" 
                                                           id="imageFileInput" 
                                                           class="form-control"
                                                           accept="image/jpeg,image/jpg,image/png">
                                                    <div class="form-text">Chấp nhận: JPG, PNG (tối đa 10MB)</div>
                                                    
                                                    <!-- Preview ảnh -->
                                                    <div id="imagePreview" class="mt-2" style="display:none;">
                                                        <p class="small text-success mb-1">
                                                            <i class="fas fa-check-circle"></i> Ảnh đã tải lên:
                                                        </p>
                                                        <img id="previewImg" 
                                                             src="" 
                                                             alt="Preview"
                                                             class="img-thumbnail"
                                                             style="max-width: 200px; max-height: 200px; object-fit: contain;">
                                                        <div class="mt-1">
                                                            <button type="button" 
                                                                    id="removeImageBtn" 
                                                                    class="btn btn-sm btn-danger">
                                                                <i class="fas fa-trash"></i> Xóa ảnh
                                                            </button>
                                                        </div>
                                                    </div>
                                                    
                                                    <!-- Progress bar -->
                                                    <div id="uploadProgress" class="mt-2" style="display:none;">
                                                        <div class="progress">
                                                            <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                                                 role="progressbar" 
                                                                 style="width: 100%">
                                                                Đang upload...
                                                            </div>
                                                        </div>
                                                    </div>
                                                    
                                                    <!-- Error message -->
                                                    <div id="uploadError" class="alert alert-danger mt-2" style="display:none;"></div>
                                                    
                                                    <!-- Hiển thị ảnh hiện tại khi edit -->
                                                    <div th:if="${isEdit and antiqueDTO.anhChinhCurrent != null and !antiqueDTO.anhChinhCurrent.isEmpty()}" class="mt-2">
                                                        <p class="small text-muted mb-1">Ảnh hiện tại:</p>
                                                        <img th:src="@{'/uploads/' + ${antiqueDTO.anhChinhCurrent}}"
                                                             alt="Ảnh hiện tại"
                                                             class="img-thumbnail"
                                                             style="max-width: 200px; max-height: 200px; object-fit: contain;">
                                                    </div>
                                                </div>

                                                <!-- Mô tả -->
                                                <div class="mb-3">
                                                    <label for="moTa" class="form-label fw-semibold">
                                                        Mô tả chi tiết
                                                    </label>
                                                    <textarea id="moTa"
                                                              th:field="*{moTa}"
                                                              th:classappend="${#fields.hasErrors('moTa')} ? ' is-invalid'"
                                                              class="form-control"
                                                              rows="5"
                                                              placeholder="Mô tả lịch sử, đặc điểm, nguồn gốc..."></textarea>
                                                    <div th:if="${#fields.hasErrors('moTa')}"
                                                         class="invalid-feedback"
                                                         th:errors="*{moTa}"></div>
                                                </div>

                                            </div>
                                        </div>

                                        <!-- Nút hành động -->
                                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                            <a th:href="@{/antiques}" class="btn btn-secondary">
                                                <i class="fas fa-times me-1"></i> Hủy
                                            </a>
                                            <button type="submit" class="btn btn-primary">
                                                <i class="fas fa-save me-1"></i>
                                                <span th:text="${isEdit} ? 'Cập nhật' : 'Tạo mới'"></span>
                                            </button>
                                        </div>

                                    </form>

                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>

            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

    <!-- AJAX Image Upload Script -->
    <script th:inline="javascript">
        // CSRF token cho AJAX requests
        const csrfMeta = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        const csrfToken = csrfMeta ? csrfMeta.content : '';
        const csrfHeader = csrfHeaderMeta ? csrfHeaderMeta.content : 'X-CSRF-TOKEN';
        
        const fileInput = document.getElementById('imageFileInput');
        const hiddenFilename = document.getElementById('anhChinhFilename');
        const previewContainer = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const progressBar = document.getElementById('uploadProgress');
        const errorDiv = document.getElementById('uploadError');
        const removeBtn = document.getElementById('removeImageBtn');
        
        let uploadedFilename = null;
        
        // Khi user chọn file → Upload ngay qua AJAX
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            // Validate file size
            const maxSize = 10 * 1024 * 1024; // 10MB
            if (file.size > maxSize) {
                showError('File ảnh quá lớn! Vui lòng chọn file < 10MB');
                fileInput.value = '';
                return;
            }
            
            // Validate file type
            if (!file.type.match('image/(jpeg|jpg|png)')) {
                showError('Chỉ chấp nhận file ảnh JPG, PNG!');
                fileInput.value = '';
                return;
            }
            
            // Upload file
            await uploadFile(file);
        });
        
        // Upload file qua AJAX
        async function uploadFile(file) {
            // Hide error, show progress
            errorDiv.style.display = 'none';
            previewContainer.style.display = 'none';
            progressBar.style.display = 'block';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('/api/files/upload', {
                    method: 'POST',
                    headers: {
                        [csrfHeader]: csrfToken
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Upload thất bại');
                }
                
                // Upload thành công
                uploadedFilename = data.filename;
                hiddenFilename.value = uploadedFilename; // Set hidden field
                
                // Hiển thị preview
                previewImg.src = data.url;
                previewContainer.style.display = 'block';
                progressBar.style.display = 'none';
                
                console.log('✓ Uploaded:', uploadedFilename);
                
            } catch (error) {
                console.error('✗ Upload error:', error);
                showError(error.message);
                fileInput.value = '';
                progressBar.style.display = 'none';
            }
        }
        
        // Xóa ảnh đã upload
        removeBtn.addEventListener('click', async function() {
            if (!uploadedFilename) return;
            
            try {
                await fetch(`/api/files/delete/${uploadedFilename}`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });
                
                // Clear UI
                uploadedFilename = null;
                hiddenFilename.value = '';
                previewContainer.style.display = 'none';
                fileInput.value = '';
                
                console.log('✓ Image removed');
            } catch (error) {
                console.error('✗ Delete error:', error);
            }
        });
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>

</body>
</html>
