<!DOCTYPE html>
<!--
  Fragment: fragments/sidebar
  Thanh điều hướng bên trái.

  Tính năng:
    - Active state tự động theo URL hiện tại (#httpServletRequest)
    - Ẩn/hiện menu theo role bằng sec:authorize
    - Icon từ Bootstrap Icons

  Cách sử dụng:
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="sidebar"
     id="sidebar"
     class="sidebar d-flex flex-column bg-dark text-white"
     style="min-width:240px; max-width:240px;">

    <!-- ===== BRAND ===== -->
    <div class="px-3 py-3 border-bottom border-secondary d-flex align-items-center gap-2">
        <i class="bi bi-archive-fill text-warning fs-4"></i>
        <div>
            <div class="fw-bold text-white" style="font-size:0.95rem;">KHO ĐỒ CỔ</div>
            <div class="text-secondary" style="font-size:0.7rem;">Quản lý kho hàng</div>
        </div>
    </div>

    <!-- ===== NAVIGATION MENU ===== -->
    <ul class="nav flex-column px-2 py-2 flex-grow-1">

        <!-- Dashboard -->
        <li class="nav-item">
            <a th:href="@{/dashboard}"
               th:classappend="${currentUri.startsWith('/dashboard')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>

        <!-- Ngăn cách - Quản lý nghiệp vụ -->
        <li class="nav-item mt-2">
            <small class="text-secondary px-3 text-uppercase fw-bold"
                   style="font-size:0.65rem; letter-spacing:0.08em;">
                Nghiệp vụ kho
            </small>
        </li>

        <!-- Danh mục đồ cổ -->
        <li class="nav-item">
            <a th:href="@{/categories}"
               th:classappend="${currentUri.startsWith('/categories')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-tags me-2"></i>Danh mục
            </a>
        </li>

        <!-- Quản lý đồ cổ -->
        <li class="nav-item">
            <a th:href="@{/antiques}"
               th:classappend="${currentUri.startsWith('/antiques')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-gem me-2"></i>Đồ cổ
            </a>
        </li>

        <!-- Tồn kho -->
        <li class="nav-item">
            <a th:href="@{/inventory}"
               th:classappend="${currentUri.startsWith('/inventory')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-boxes me-2"></i>Tồn kho
            </a>
        </li>

        <!-- Nhập kho -->
        <li class="nav-item">
            <a th:href="@{/import-receipts}"
               th:classappend="${currentUri.startsWith('/import-receipts')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-box-arrow-in-down me-2"></i>Nhập kho
            </a>
        </li>

        <!-- Xuất kho -->
        <li class="nav-item">
            <a th:href="@{/export-receipts}"
               th:classappend="${currentUri.startsWith('/export-receipts')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-box-arrow-up me-2"></i>Xuất kho
            </a>
        </li>

        <!-- Báo cáo -->
        <li class="nav-item">
            <a th:href="@{/reports}"
               th:classappend="${currentUri.startsWith('/reports')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-bar-chart-line me-2"></i>Báo cáo
            </a>
        </li>

        <!-- Lịch sử hoạt động -->
        <li class="nav-item">
            <a th:href="@{/warehouse-activities}"
               th:classappend="${currentUri.startsWith('/warehouse-activities')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-clock-history me-2"></i>Lịch sử hoạt động
            </a>
        </li>

        <!-- Kiểm tra đồ cổ -->
        <li class="nav-item">
            <a th:href="@{/antique-inspections}"
               th:classappend="${currentUri.startsWith('/antique-inspections')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2 d-flex align-items-center justify-content-between">
                <span>
                    <i class="bi bi-clipboard-check me-2"></i>Kiểm tra đồ cổ
                </span>
                <span th:if="${pendingInspectionsBadge != null and pendingInspectionsBadge > 0}"
                      class="badge bg-danger rounded-pill"
                      th:text="${pendingInspectionsBadge}">0</span>
            </a>
        </li>

        <!-- ===== CHỈ ADMIN MỚI THẤY PHẦN NÀY ===== -->
        <li class="nav-item mt-2" sec:authorize="hasRole('ADMIN')">
            <small class="text-secondary px-3 text-uppercase fw-bold"
                   style="font-size:0.65rem; letter-spacing:0.08em;">
                Quản trị
            </small>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/users}"
               th:classappend="${currentUri.startsWith('/admin/users')} ? ' active' : ''"
               class="nav-link text-white rounded px-3 py-2">
                <i class="bi bi-people me-2"></i>Người dùng
            </a>
        </li>

    </ul>

    <!-- ===== FOOTER SIDEBAR: version ===== -->
    <div class="px-3 py-2 border-top border-secondary">
        <small class="text-secondary" style="font-size:0.7rem;">
            <i class="bi bi-info-circle me-1"></i>v1.0.0 &bull; Đồ án J2EE
        </small>
    </div>

</nav>

</html>
