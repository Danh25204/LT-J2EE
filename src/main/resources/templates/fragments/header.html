<!DOCTYPE html>
<!--
  Fragment: fragments/header
  Chứa 2 fragments:
    1. head(title)  → <head> section với CSS imports
    2. topnav       → Top navigation bar

  Cách sử dụng trong template:
    <head th:replace="~{fragments/header :: head('Tên trang')}"></head>
    <div th:replace="~{fragments/header :: topnav}"></div>
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- =====================================================
     Fragment 1: <head> section - CSS imports & meta tags
     ===================================================== -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF token cho AJAX requests -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <!-- Thymeleaf nối tiêu đề trang với tên hệ thống -->
    <title th:text="${title} + ' | Kho Đồ Cổ'">Kho Đồ Cổ</title>

    <!-- Bootstrap 5.3 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons (icon library đi kèm Bootstrap) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Font Awesome 6 (for fas fa-* icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">

    <!-- Custom CSS của project -->
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <!-- DataTables CSS (client-side pagination) -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>

<!-- =====================================================
     Fragment 2: Top navigation bar
     ===================================================== -->
<nav th:fragment="topnav"
     class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm px-3 py-2">

    <!-- Nút toggle sidebar (cho mobile) -->
    <button class="btn btn-sm btn-outline-secondary me-2" id="sidebarToggle" title="Ẩn/hiện menu">
        <i class="bi bi-list fs-5"></i>
    </button>

    <!-- Breadcrumb title - lấy từ model attribute "pageTitle" -->
    <span class="navbar-text fw-semibold text-dark" th:text="${pageTitle ?: 'Kho Đồ Cổ'}">
        Dashboard
    </span>

    <!-- User dropdown - bên phải navbar -->
    <div class="ms-auto d-flex align-items-center gap-2">

        <!-- Thời gian hiện tại (hiển thị bằng JS) -->
        <small class="text-muted d-none d-md-inline" id="currentTime"></small>

        <!-- Avatar + dropdown menu -->
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-primary dropdown-toggle d-flex align-items-center gap-1"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <!-- sec:authentication="name" → lấy username đang đăng nhập -->
                <span sec:authentication="name">Người dùng</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow">
                <li>
                    <div class="px-3 py-2">
                        <div class="fw-semibold" sec:authentication="name">Username</div>
                        <!-- Hiển thị role hiện tại -->
                        <small class="text-muted">
                            <span sec:authorize="hasRole('ADMIN')">
                                <i class="bi bi-shield-check text-danger me-1"></i>Quản trị viên
                            </span>
                            <span sec:authorize="hasRole('NHAN_VIEN')">
                                <i class="bi bi-person-badge text-primary me-1"></i>Nhân viên kho
                            </span>
                        </small>
                    </div>
                </li>
                <li><hr class="dropdown-divider my-1"></li>
                <!-- Form logout: dùng POST để bảo vệ CSRF (Spring Security yêu cầu) -->
                <li>
                    <form th:action="@{/auth/logout}" method="post" class="d-inline w-100">
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

</html>
