<!DOCTYPE html>
<!-- Trang lỗi 404 - Không tìm thấy trang -->
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang | Kho Đồ Cổ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="text-center p-4">
    <i class="bi bi-search" style="font-size:5rem; color:#6c757d;"></i>
    <h1 class="display-4 fw-bold text-secondary mt-2">404</h1>
    <h4 class="text-dark">Không tìm thấy trang bạn yêu cầu</h4>
    <p class="text-muted mb-4">
        Trang này không tồn tại hoặc đã bị di chuyển.
        <br>URL: <code th:text="${request.requestURI}">/some/path</code>
    </p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="/dashboard" class="btn btn-primary">
            <i class="bi bi-house me-1"></i>Về Dashboard
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Quay lại
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
