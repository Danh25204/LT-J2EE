# ==========================================
# CẤU HÌNH ỨNG DỤNG - ANTIQUE WAREHOUSE
# ==========================================

spring.application.name=antique-warehouse
server.port=8080

# ==========================================
# CẤU HÌNH DATABASE - MySQL 8
# !! THAY ĐỔI username/password theo máy bạn !!
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/antique_warehouse?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool HikariCP (tự động dùng bởi Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# ==========================================
# CẤU HÌNH JPA / HIBERNATE
# ==========================================
# update = tự động sync schema với entity (dùng khi dev)
# create = xóa và tạo lại schema mỗi lần chạy (NGUY HIỂM - mất data)
# validate = chỉ kiểm tra, không thay đổi schema (dùng production)
# none = không làm gì
spring.jpa.hibernate.ddl-auto=update

# In SQL ra console (tắt khi production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect cho MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# Tránh LazyInitializationException khi in log entity
spring.jpa.open-in-view=false

# ==========================================
# CẤU HÌNH THYMELEAF
# ==========================================
# Tắt cache khi dev (bật khi production: true)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==========================================
# CẤU HÌNH UPLOAD FILE ẢNH
# ==========================================
# Cho phép multipart upload
spring.servlet.multipart.enabled=true
# Kích thước tối đa 1 file
spring.servlet.multipart.max-file-size=10MB
# Kích thước tối đa toàn bộ request
spring.servlet.multipart.max-request-size=10MB
# Thư mục tạm để xử lý upload
spring.servlet.multipart.location=${java.io.tmpdir}

# Tomcat multipart config
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB

# Thư mục lưu ảnh upload (tạo tự động nếu chưa có)
# Đường dẫn tương đối tính từ thư mục chạy ứng dụng
app.upload.dir=uploads/images

# ==========================================
# CẤU HÌNH LOGGING
# ==========================================
logging.level.com.example.antique=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# CẤU HÌNH SESSION (Spring Security)
# ==========================================
# Thời gian hết hạn session: 30 phút
server.servlet.session.timeout=30m
